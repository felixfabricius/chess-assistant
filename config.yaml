root_data_folder: data
setup_folder:
  create_new: True
  # Click a dedicated centre piece-top during calibration (new v2 style) instead of
  # interpolating the centre from the four extended corners.
  annotate_center: True
  measurements:
    # Distance from center of chessboard to nearest point of base of robot from birds eye view in cm
    dist: 25 
    # Elevation of base of robot from table (on which chessboard also stands)
    height: 13
    # Degrees by which the chessboard would have to be rotated around its center clockwise so that
    # base of robot is perfectly parallel to it 
    rotation: 22.5
    # Assume the robot was oriented (body) such that it's gaze is parallel to a column on chess board.
    # By how many centimeters would it have to be moved (left -, right +) to be in the middle of the chess board?
    # (Note that some offset might be ideal for image quality.) 
    offset: 12.5
  chessboard: 0
  documentation_image: 2026/06/17_19:41

image_processing:
  board_size: 400
  square_cutout_size: 144

vision:
  model: CNN
  model_weights_path: weights/model_state_dict.safetensors
  model_version: claude-opus-4-8
  prompt_version: 1
  
engine:
  # Path to a Stockfish binary. null -> $STOCKFISH_PATH, then whatever is on PATH.
  # Only needed for move rating and commentary; reading the board and ranking candidate
  # moves never starts an engine.
  stockfish_path: null
  depth: 16

input:
  source: keyboard # alternative: robot

speaker:
  model: claude-haiku-4-5
  # A 20-word one-liner is ~35 tokens. The cap is a backstop against a runaway comment:
  # Kokoro synthesizes at ~0.6x realtime, so a long comment is slow to generate AND slow
  # to listen to.
  max_tokens: 64
  voice: bm_george
  recent_moves: 6
  recent_cp_losses: 5
  splice_gap_ms: 40   # silence between the pregenerated clips of a move suggestion
                      # ("E2 to," + "E4?"). Tune by ear: uv run python -m
                      # chess_assistant.audition_speech --sweep
  # The closing roast is 3-4 sentences, not a one-liner, so it gets its own cap.
  # ~60 words is ~110 tokens; 200 leaves headroom without licensing a monologue.
  outro:
    max_tokens: 200
    max_words: 60

# Played once the game ends. Entirely best-effort: any failure here is logged and skipped,
# since the game is already over by the time any of it runs.
outro:
  enabled: True
  dance: # checkmate only -- nobody celebrates a stalemate
    dataset: pollen-robotics/reachy-mini-dances-library
    move: groovy_sway_and_roll
    # groovy_sway_and_roll is a 1.84s loop unit rather than a whole dance, so it is repeated.
    # 4 repeats (~7.4s) is the floor; past that the loop only keeps going while the roast is
    # still being written and synthesized, up to 8 (~14.7s), so the robot never stands in
    # silence waiting for Claude.
    min_repeats: 4
    max_repeats: 8
  sleep: # every ending, checkmate or draw
    dataset: pollen-robotics/reachy-mini-emotions-library
    move: downcast1

# Seconds the players get to reject a suggested move. Doubles as the window in which that
# move's comment is pre-generated in the background (stockfish ~0.2s + claude ~1.5s +
# kokoro ~0.6x the spoken duration). Raise it if comments still lag behind acceptance.
review_time: 4

monitor_calibration: True