root_data_folder: data
setup_folder:
  create_new: True
  # Click a dedicated centre piece-top during calibration (new v2 style) instead of
  # interpolating the centre from the four extended corners.
  annotate_center: True
  measurements:
    # Distance from center of chessboard to nearest point of base of robot from birds eye view in cm
    dist: 25 
    # Elevation of base of robot from table (on which chessboard also stands)
    height: 13
    # Degrees by which the chessboard would have to be rotated around its center clockwise so that
    # base of robot is perfectly parallel to it 
    rotation: 22.5
    # Assume the robot was oriented (body) such that it's gaze is parallel to a column on chess board.
    # By how many centimeters would it have to be moved (left -, right +) to be in the middle of the chess board?
    # (Note that some offset might be ideal for image quality.) 
    offset: 12.5
  chessboard: 0
  documentation_image: 2026/06/17_19:41

image_processing:
  board_size: 400
  square_cutout_size: 144

vision:
  model: CNN
  model_path: artifacts/model_and_optimizer-v18/model_rd68eyo6.pt
  model_version: claude-opus-4-8
  prompt_version: 1
  
input:
  source: keyboard # alternative: robot

speaker:
  model: claude-haiku-4-5
  # A 20-word one-liner is ~35 tokens. The cap is a backstop against a runaway comment:
  # Kokoro synthesizes at ~0.6x realtime, so a long comment is slow to generate AND slow
  # to listen to.
  max_tokens: 64
  voice: bm_george
  recent_moves: 6
  recent_cp_losses: 5

# Seconds the players get to reject a suggested move. Doubles as the window in which that
# move's comment is pre-generated in the background (stockfish ~0.2s + claude ~1.5s +
# kokoro ~0.6x the spoken duration). Raise it if comments still lag behind acceptance.
review_time: 4